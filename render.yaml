services:
  - type: web
    name: ai-flask-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 180
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: GEMINI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: PEXELS_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXP_DAYS
        value: "7"
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: ai_website_generator
      - key: MONGODB_USER
        sync: false
      - key: MONGODB_PASSWORD
        sync: false
      - key: MONGODB_AUTH_DB
        value: admin

  - type: web
    name: ai-express-gateway
    runtime: node
    rootDir: WebApp/express-api
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.18.1
      - key: FLASK_BASE_URL
        sync: false
